# ESP-Prog + ESP32 OpenOCD scaffold
#
# Requires Espressif's OpenOCD build (includes target/esp32.cfg).
#
# Wiring (ESP-Prog JTAG -> ESP32):
#   TMS, TCK, TDI, TDO, GND, 3V3

adapter driver ftdi

# ESP-Prog (FT2232H) common VID/PID pairs.
ftdi vid_pid 0x0403 0x6010 0x0403 0x6014

# ESP-Prog uses channel 0 for JTAG.
ftdi channel 0

# Conservative layout init values used by ESP-Prog FTDI interfaces.
ftdi layout_init 0x0008 0x000b

transport select jtag
adapter speed 5000

reset_config none

# Load target support from OpenOCD scripts dir passed by task input.
source [find target/esp32.cfg]
