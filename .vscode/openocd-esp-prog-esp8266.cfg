# ESP-Prog + ESP8266 OpenOCD scaffold
#
# This file expects an OpenOCD build that includes target/esp8266.cfg
# (typically Espressif's OpenOCD packages).
#
# Wiring (ESP-Prog JTAG -> ESP8266):
#   TMS, TCK, TDI, TDO, GND, 3V3

adapter driver ftdi

# ESP-Prog (FT2232H) common VID/PID pairs.
ftdi vid_pid 0x0403 0x6010 0x0403 0x6014

# ESP-Prog uses channel 0 for JTAG.
ftdi channel 0

# Conservative layout init values used by ESP-Prog FTDI interfaces.
ftdi layout_init 0x0008 0x000b

transport select jtag
adapter speed 1000

# ESP8266 has no dedicated SRST/TRST in many hobby setups.
reset_config none

# Load target support from OpenOCD scripts dir passed by task input.
source [find target/esp8266.cfg]
